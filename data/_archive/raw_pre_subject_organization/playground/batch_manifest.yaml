# Batch scoring manifest
#
# Add one entry per video. Drop the video files into data/raw/playground/.
#
# Required per entry:
#   video_file        — filename only (not full path)
#   activity_name     — short readable name; used in report tables
#   duration_minutes  — integer
#   activity_context  — free-form description that helps Gemini focus on
#                       what's relevant for THIS activity
#
# Optional per entry:
#   recorded_at       — YYYY-MM-DD; defaults to 2026-05-19 if missing
#   age_range         — defaults to "3-5 years"

videos:
  - video_file: floorpainting.MOV
    activity_name: "Floor painting"
    duration_minutes: 5
    activity_context: "Floor painting activity: paper laid on the floor with paints and brushes for children. The first part of the video shows the empty/prepared space, then children entering and starting to paint."

  - video_file: multisensorybins_1505.MOV
    activity_name: "Multi-sensory bins"
    duration_minutes: 5
    activity_context: "Multi-sensory bins: hands-on play containers filled with varied textures, sounds, colors, and scents to support fine motor and emotional regulation. The video shows the empty/prepared space first, then children entering and engaging with the bins."

  - video_file: damru_1.mov
    activity_name: "Damru"
    duration_minutes: 5
    activity_context: "Damru activity for children: exploratory play with damru (a small two-headed traditional Indian drum). The video shows the prepared space first, then children entering and engaging with the materials. Specific setup details not provided."

  - video_file: naturesensorybin_1.mov
    activity_name: "Nature sensory bin (1)"
    duration_minutes: 5
    activity_context: "Nature sensory bin: sensory exploration with nature-themed materials in containers. The video shows the prepared space first, then children entering and engaging with the materials. Specific setup details not provided."

  - video_file: sandplay_1.mov
    activity_name: "Sand play"
    duration_minutes: 5
    activity_context: "Sand play activity: sensory and exploratory play with sand. The video shows the prepared space first, then children entering and engaging with the sand. Specific setup details not provided."

  - video_file: naturesensorybin_HRBR.MOV
    activity_name: "Nature sensory bin (HRBR)"
    duration_minutes: 5
    activity_context: "Nature sensory bin: imaginative role play combined with sensory exploration focused on nature and home themes. The video shows the prepared space first, then children entering and engaging with the materials."

  - video_file: waterplay.mov
    activity_name: "Water play"
    duration_minutes: 5
    activity_context: "Water play and exploratory play using containers, buckets, scoops, and small toys for pouring and transferring. The video shows the prepared space first, then children entering and engaging with the water-based materials."
