version: 0.1.0
name: TQM Pre-K Teaching Rubric
created_at: 2026-05-15

context:
  age_range: "3-5 years (Pre-K)"
  subject_scope: "general preschool, not subject-specific"
  scoring_scale: "1-5"
  framework_basis: |
    Structure adapted from the publicly described Pre-K CLASS framework
    (Pianta et al.) — 3 domains, 10 dimensions, with the standard indicator
    names. All anchor descriptions and signal mappings in this file are
    original to TQM and are NOT derived from the licensed Teachstone manual.
    For commercial use positioned as "CLASS-based" scoring, license CLASS
    from Teachstone.

scoring_scale:
  values:
    1: "Indicator absent, very weak, or actively counterproductive throughout the session"
    2: "Indicator rarely present and surface-level when it appears"
    3: "Inconsistent presence; some moments strong, many missing or weak"
    4: "Consistently present and routinely visible across most of the session"
    5: "Deeply present, responsive, and adaptive throughout the session"
  insufficient_evidence: |
    Use this in place of a numeric score when camera angle, audio quality,
    or session content does not allow the dimension to be observed.

anti_bias_rules:
  - "Do not score based on the teacher's accent, English fluency, voice pitch, or any feature suggestive of demographics."
  - "Do not score based on classroom material wealth (room size, equipment quality, decor)."
  - "Prefer 'insufficient_evidence' over guessing from thin signal."
  - "Mid-activity corrections during student attempts are valid teaching, not interruptions."
  - "Cultural communication norms (degree of silence, formality, group orientation) must not lower scores."
  - "If the same observable behavior would receive a different score from a teacher of a different background, return the score the behavior earns on its own."

evidence_requirements:
  - "Every numeric score must be supported by at least one timestamped quote or visual observation."
  - "Quotes must be present in the transcript; visual observations must be present in the vision-pass output."
  - "Confidence must be reported per dimension (high / medium / low)."

domains:

  - id: emotional_support
    label: "Emotional Support"
    description: "How well the teacher creates a warm, respectful, and emotionally safe environment for young children."
    dimensions:

      - id: positive_climate
        label: "Positive Climate"
        description: "Warmth, connection, and shared enjoyment between teacher and students."
        indicators:
          - "Relationships (warmth, closeness)"
          - "Positive affect (smiling, laughter, enthusiasm)"
          - "Positive communication (verbal and non-verbal warmth)"
          - "Respect (eye contact, names used, calm tone)"
        signal_mappings:
          audio:
            - "Warm tone of voice; frequent use of student names"
            - "Laughter, playful language, songs, chants"
            - "Verbal expressions of care, encouragement, or affection"
          visual:
            - "Smiling; eye contact at child's level; kneeling or sitting with students"
            - "Appropriate physical proximity and gentle touch (e.g., reassuring hand on shoulder)"
            - "Group activities that visibly produce shared enjoyment"
        anchors:
          1: "Cold, detached, or transactional tone; no smiles or warmth observed; minimal teacher-student interaction beyond instructions"
          2: "Functional but flat interactions; warmth is rare; tone is mostly task-directed"
          3: "Some warmth, but inconsistent across the session or distributed unevenly across students"
          4: "Consistently warm tone, smiles, and respectful interactions across most of the session and most students"
          5: "Visibly joyful, connected classroom; warmth extends to every student observed; strong rapport that draws students in"
        common_failure_modes:
          - "Quiet teacher misread as cold — verify against audio tone and student response"
          - "Cultural norms around physical proximity and verbal expressiveness vary"

      - id: negative_climate
        label: "Negative Climate"
        description: "Anger, harshness, sarcasm, or punitive interactions in the classroom. Lower numeric score = MORE negativity observed (reverse-scored)."
        scoring_direction: "reverse"
        indicators:
          - "Negative affect (irritation, anger, frustration)"
          - "Punitive control (threats, raised-voice discipline)"
          - "Sarcasm or disrespect"
          - "Severe negativity (humiliation, harsh punishment)"
        signal_mappings:
          audio:
            - "Voice raised in anger (distinct from teaching projection)"
            - "Sarcastic phrasing or mocking tone toward students"
            - "Threats of consequence ('if you don't stop, I'll...')"
            - "Humiliating language directed at a specific child"
          visual:
            - "Tense posture, aggressive pointing, looming over a child"
            - "Physical isolation of a child as punishment"
            - "Visible flinching or distress in students after teacher behavior"
        anchors:
          1: "Frequent or severe negativity; sustained anger, harshness, or humiliation observed"
          2: "Multiple instances of irritability, sarcasm, or harsh tone across the session"
          3: "Occasional flashes of impatience but generally controlled"
          4: "Brief, isolated moments of frustration; quickly recovered without lasting tone shift"
          5: "No observable negativity; calm, regulated tone maintained throughout, even under stress"

      - id: teacher_sensitivity
        label: "Teacher Sensitivity"
        description: "Awareness of and responsiveness to students' academic and emotional needs."
        indicators:
          - "Awareness (notices when students need help)"
          - "Responsiveness (acts on what is noticed)"
          - "Effective problem resolution"
          - "Student comfort (children seek out the teacher freely)"
        signal_mappings:
          audio:
            - "Teacher acknowledges student bids for attention ('I hear you, one moment')"
            - "Soothing tone with distressed students"
            - "Specific responses to specific student needs (not generic acknowledgments)"
          visual:
            - "Teacher scans the room frequently"
            - "Adjusts proximity to a struggling student"
            - "Students approach the teacher freely with questions or distress"
        anchors:
          1: "Teacher unaware of or dismissive toward students' emotional or academic needs; bids for attention ignored"
          2: "Notices needs but responds slowly, partially, or with generic answers"
          3: "Inconsistent awareness; some students get attention, others overlooked or delayed"
          4: "Consistently aware; responds appropriately to most situations within a reasonable window"
          5: "Highly attuned; anticipates needs before they escalate; students visibly comfortable seeking help"

      - id: regard_for_student_perspectives
        label: "Regard for Student Perspectives"
        description: "Degree to which the teacher follows students' lead, supports autonomy, and allows expression."
        indicators:
          - "Flexibility / student focus (follows interests)"
          - "Support for autonomy (offers choice and leadership)"
          - "Student expression (substantial student talk and voice)"
          - "Restriction of movement (reverse indicator — over-restriction lowers the score)"
        signal_mappings:
          audio:
            - "Open questions inviting student opinion ('what do you think?', 'how would you do it?')"
            - "Teacher builds on student ideas rather than overriding them"
            - "Student talk time is substantial relative to teacher talk"
          visual:
            - "Students moving and choosing within a structured frame"
            - "Student-led moments (e.g., a student leading a song or showing a peer)"
            - "No over-restriction of movement (children not held in one place beyond developmental tolerance)"
        anchors:
          1: "Rigid teacher control; no student choice or voice; movement heavily restricted with no clear purpose"
          2: "Mostly teacher-driven; rare moments of student input or choice"
          3: "Some opportunities for student voice or choice but limited or token"
          4: "Regular invitations for student perspective; choices embedded in activities; student talk substantial"
          5: "Student-led moments throughout; teacher follows interests; rich expression and visible autonomy"

  - id: classroom_organization
    label: "Classroom Organization"
    description: "How well the teacher manages behavior, time, and instructional formats so learning can happen."
    dimensions:

      - id: behavior_management
        label: "Behavior Management"
        description: "Effectiveness in preventing, redirecting, and resolving misbehavior; clarity of expectations."
        indicators:
          - "Clear behavior expectations"
          - "Proactive (anticipates rather than reacts)"
          - "Effective redirection of misbehavior"
          - "Student behavior (overall on-task pattern)"
        signal_mappings:
          audio:
            - "Pre-stated rules and routines ('remember our hands-up signal')"
            - "Calm, specific redirections ('Aarav, eyes here please')"
            - "Positive narration of desired behavior ('I see Maya sitting ready')"
          visual:
            - "Teacher positions self to scan the whole group"
            - "Quick, low-key redirections rather than escalating consequences"
            - "Most students engaged in the intended activity at any given moment"
        anchors:
          1: "Chaotic; frequent off-task behavior; reactive and ineffective responses; expectations unclear"
          2: "Significant off-task behavior; redirections inconsistent or escalate without resolving"
          3: "Mixed; some routines work, others break down; recovery is slow"
          4: "Generally smooth; quick effective redirects; most students on-task most of the time"
          5: "Proactive and seamless; misbehavior is rare and resolved before it escalates; expectations internalized by students"

      - id: productivity
        label: "Productivity"
        description: "Maximization of instructional time; smoothness of routines and transitions."
        indicators:
          - "Maximizing learning time"
          - "Established routines"
          - "Smooth transitions"
          - "Teacher preparation"
        signal_mappings:
          audio:
            - "Brief, clear transition cues ('two minutes, then circle time')"
            - "Minimal dead air or off-topic teacher talk"
            - "Students know what comes next without extensive prompting"
          visual:
            - "Materials laid out and ready; little time spent searching"
            - "Students move through routine flow without waiting around"
            - "Minimal idle time between activities"
        anchors:
          1: "Significant time lost to disorganization; transitions slow and confused; routines unclear"
          2: "Some dead time; transitions frequently slow; routines partially established"
          3: "Mixed; some segments productive, others lose momentum"
          4: "Mostly smooth; transitions quick; routines well-established and visible"
          5: "Highly efficient; nearly all time is productive; transitions are seamless and student-initiated"

      - id: instructional_learning_formats
        label: "Instructional Learning Formats"
        description: "Variety, interest, and clarity of the formats used to deliver learning."
        indicators:
          - "Effective facilitation"
          - "Variety of modalities and materials"
          - "Student interest and engagement"
          - "Clarity of learning objectives"
        signal_mappings:
          audio:
            - "Teacher states what students will learn or do, in age-appropriate language"
            - "Variety in question types, songs, story-telling, discussion"
            - "Student vocalizations indicate interest, not boredom (questions, exclamations, requests for more)"
          visual:
            - "Multiple materials or modalities used (props, visuals, movement, music)"
            - "Students visibly engaged — looking, leaning in, participating"
            - "Teacher uses gestures, facial expression, and movement to hold attention"
        anchors:
          1: "Single dull modality; students disengaged; objective unclear or missing"
          2: "Limited variety; engagement low; objectives implicit at best"
          3: "Some variety; engagement uneven; objectives stated but not reinforced"
          4: "Good variety of formats; most students engaged; objectives clear and reinforced"
          5: "Rich, varied formats; high engagement throughout; objectives explicit, reinforced, and visibly met"

  - id: instructional_support
    label: "Instructional Support"
    description: "Depth of cognitive engagement, quality of feedback, and richness of language."
    dimensions:

      - id: concept_development
        label: "Concept Development"
        description: "Use of discussion and activities that promote higher-order thinking, not just recall."
        indicators:
          - "Analysis and reasoning"
          - "Creating (brainstorming, generating ideas)"
          - "Integration (linking concepts together)"
          - "Connections to the real world"
        signal_mappings:
          audio:
            - "'Why' and 'how' questions, not just 'what'"
            - "Teacher links the activity to student experience or prior learning"
            - "Invitations to predict, compare, or explain"
          visual:
            - "Use of concrete examples, models, or real-world objects"
            - "Students gesturing or pointing while explaining (a sign of active reasoning)"
        anchors:
          1: "Pure rote or recall; no higher-order prompts; no real-world connection"
          2: "Mostly recall with occasional 'why' questions; weak integration"
          3: "Some analysis prompts but inconsistent depth or follow-through"
          4: "Frequent reasoning prompts; some integration and real-world links"
          5: "Rich, sustained higher-order discussion; concepts integrated, applied, and connected to children's lives"

      - id: quality_of_feedback
        label: "Quality of Feedback"
        description: "How feedback extends learning rather than simply marking right or wrong."
        indicators:
          - "Scaffolding (hints to help reach an answer)"
          - "Feedback loops (back-and-forth on the same idea)"
          - "Prompting thought processes ('how did you know?')"
          - "Providing information (substantive content in feedback)"
          - "Encouragement and affirmation"
        signal_mappings:
          audio:
            - "Teacher follows up student answers with hints or extensions, not just 'right/wrong'"
            - "Multi-turn exchanges on the same idea (3+ turns)"
            - "Specific praise tied to behavior or thinking ('you noticed the pattern in the rhythm')"
          visual:
            - "Teacher pauses and waits after student response (3+ seconds)"
            - "Re-engages the same student after a partial answer instead of moving on"
        anchors:
          1: "Right/wrong only; no scaffolding; minimal or generic praise ('good job')"
          2: "Mostly evaluative; rare follow-up; praise is vague and unspecific"
          3: "Some scaffolding moments but feedback loops are short and inconsistent"
          4: "Regular scaffolding and follow-up; encouragement is specific to what the student did"
          5: "Sustained, rich feedback loops; consistently extends thinking; affirmation is specific and meaningful"

      - id: language_modeling
        label: "Language Modeling"
        description: "Strategies that develop students' language and vocabulary."
        indicators:
          - "Frequent conversation"
          - "Open-ended questions"
          - "Repetition and extension of student talk"
          - "Self-talk and parallel talk (narrating actions)"
          - "Use of advanced vocabulary"
        signal_mappings:
          audio:
            - "High proportion of teacher↔student dialogue (not monologue)"
            - "Open-ended questions outnumber yes/no questions"
            - "Teacher repeats a student's utterance and adds words to it"
            - "New or sophisticated vocabulary introduced with brief explanation"
            - "Teacher narrates her own actions or the children's actions in real time"
          visual:
            - "Teacher visibly engaged in conversation, not just instruction"
            - "Body orientation toward speaking student"
        anchors:
          1: "Mostly directive talk; few questions; no vocabulary expansion"
          2: "Limited dialogue; closed (yes/no) questions dominate; rare extensions"
          3: "Some open questions and extensions but inconsistent across the session"
          4: "Regular dialogue; open questions common; routine extension and some vocabulary growth"
          5: "Rich, sustained conversation; consistent open questions, extensions, parallel talk, and advanced vocabulary"
