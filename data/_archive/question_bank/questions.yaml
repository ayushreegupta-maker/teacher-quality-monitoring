# Preschool Classroom Quality — Question Bank v1
#
# 91 questions across 5 buckets, derived from established preschool quality
# frameworks (CLASS Pre-K, ECERS-3, Leuven, HighScope COR, EPPE Sustained
# Shared Thinking) translated into Openhouse vocabulary.
#
# Each question is tagged with a "level" (L1–L5) that predicts the Gemini
# capability needed:
#   L1 — Direct observation (what's visible)
#   L2 — Action recognition (what's happening)
#   L3 — Interactions & dynamics (multi-person relationships)
#   L4 — Pedagogical intent (inferring purpose / design choices)
#   L5 — Quality judgment (evaluating against a standard — needs rubric)

meta:
  framework_version: "v1"
  total_questions: 91
  buckets: 5
  sub_buckets: 24
  description: |
    Diagnostic question bank used to map what Gemini can/cannot answer
    about a preschool classroom video. Each question is video-observable
    in a 5-minute clip. Run the bank against multiple videos to characterize
    model performance by bucket, sub-bucket, and capability level.

# The prompt below is the template the runner will send to Gemini per video.
# {activity_context} is substituted from the video manifest.
# {questions_list} is the bucket-grouped list of questions to ask.
prompt_template: |
  You are analysing a recording of a preschool classroom (children aged 3–5).

  ACTIVITY CONTEXT:
  {activity_context}

  Note: the activity context describes what the teacher INTENDED. Report what
  actually happened in the video, which may differ from the plan.

  YOUR TASK:
  Answer each numbered question below based on what you can see and hear in
  the video.

  OUTPUT FORMAT:
  Return a JSON object where each key is the question number (as a string:
  "1", "2", ..., "91") and each value is an object with these three fields:

      {
        "answer":     "<1–3 sentences (longer only for 'how many' / 'list' / 'what minutes' questions)>",
        "confidence": "high" | "medium" | "low",
        "evidence":   "<specific timestamp(s) and what was observed, e.g. '00:01:23 — teacher places blue mat in centre of room'>"
      }

  CRITICAL RULES:

  1. WATCH THE WHOLE VIDEO BEFORE ANSWERING. Many questions ask about
     patterns, dynamics, or events that unfold across the entire recording —
     not just the opening seconds. Sample timestamps from the BEGINNING,
     MIDDLE, and END of the video. If your evidence for every answer
     clusters in the first 30 seconds, you have not actually watched
     enough of the video to answer.

  2. TIMESTAMPS ARE REQUIRED — AND MUST BE SPREAD ACROSS THE VIDEO.
     - Every answer must cite at least one specific timestamp in the
       `evidence` field (HH:MM:SS format).
     - For questions about patterns or recurring behaviour (e.g. "how does
       the teacher manage X", "do children interact with each other"),
       cite MULTIPLE timestamps from different parts of the video. A single
       timestamp at 00:00:05 is insufficient for any pattern-level question.
     - For event-specific questions (e.g. "does each child speak at least
       once"), cite the timestamps that actually evidence the claim.

  3. WHEN TO USE "INSUFFICIENT INFORMATION":
     - Use it ONLY when the video does not show or play the information needed
       (e.g. the relevant moment is off-camera, inaudible, or never happens).
     - DO NOT use it just because a question is subjective, hard, or requires
       interpretation. For subjective questions (about quality, tone, design
       intent), provide your best interpretation based on observable evidence.
     - When refusing, set `answer` to "INSUFFICIENT INFORMATION", `confidence`
       to "low", and explain in `evidence` what would have been needed to
       answer the question.

  4. ACTIVITY CONTEXT DISCIPLINE: the context above describes what the teacher
     PLANNED. Report what actually happens in the video, which may differ.
     Do not assume the planned activity is what occurred.

  5. NO GUESSING: do not invent details, names, dialogue, or events that
     aren't in the video. Do not fabricate plausible-sounding answers.

  6. ANSWER LENGTH: aim for 1–3 sentences per answer. Questions asking 'how
     many' / 'list' / 'what minutes' can be longer; everything else should be
     concise.

  7. JSON OUTPUT DISCIPLINE: Return ONLY a valid JSON object with the 91
     questions as keys. The object must have EXACTLY 91 keys (one per
     question). Do NOT emit repeated tokens, extra closing brackets, or any
     text after the JSON object closes. The response must end with a single
     closing brace `}` matching the opening `{`.

  QUESTIONS, GROUPED BY BUCKET AND SUB-CATEGORY:

  {questions_list}

# ─── Buckets ────────────────────────────────────────────────────────────────

buckets:
  - id: 1
    name: "The Space"
    framework: "Openhouse Playground Design rubric + ECERS-3 Space & Furnishings"
    sub_buckets:
      - id: "1A"
        name: "Layout & Boundary"
        questions:
          - id: 1
            level: "L2"
            text: "Is there a clearly defined activity zone, and what defines it visually?"
          - id: 2
            level: "L3"
            text: "Can a child intuitively understand where to enter the activity, where to stand/sit, and where to leave?"
          - id: 3
            level: "L2"
            text: "Is the activity zone visibly separated from storage / other room functions?"
      - id: "1B"
        name: "Materials & Resources"
        questions:
          - id: 4
            level: "L2"
            text: "What is the central \"anchor object\" of the activity, and is it clearly the focal point?"
          - id: 5
            level: "L1"
            text: "List the distinct materials available at the activity zone, with approximate counts."
          - id: 6
            level: "L3"
            text: "Are materials within child-reach (at the height a 3–5 year old can access independently)?"
          - id: 7
            level: "L3"
            text: "Which senses are engaged by the activity (visual, tactile, auditory, olfactory, kinesthetic)?"
      - id: "1C"
        name: "Aesthetic & Immersive Quality"
        questions:
          - id: 8
            level: "L4"
            text: "What is the narrative or theme of the space that immerses the child?"
          - id: 9
            level: "L4"
            text: "Does the space feel calm and inviting, or chaotic and overstimulating?"
          - id: 10
            level: "L4"
            text: "Is there a \"wow\" / surprise element that would naturally pull a child's curiosity?"
      - id: "1D"
        name: "Safety"
        questions:
          - id: 11
            level: "L2"
            text: "Are there visible safety concerns (hazards, sharp objects, unstable furniture, slippery floors, swallowable small parts)?"
      - id: "1E"
        name: "Order & Organization"
        questions:
          - id: 12
            level: "L3"
            text: "Is the space ready for the activity — set up before children arrive, with non-activity materials cleared, materials grouped meaningfully?"

  - id: 2
    name: "The Activity Design"
    framework: "Openhouse Toy Design rubric + ECERS-3 Activities"
    sub_buckets:
      - id: "2A"
        name: "Purpose & Clarity"
        questions:
          - id: 13
            level: "L4"
            text: "What is the learning objective of the activity, inferable from the setup alone (without the teacher explaining it)?"
          - id: 14
            level: "L3"
            text: "Is the activity teacher-directed, child-directed, or mixed?"
          - id: 15
            level: "L4"
            text: "What developmental skills is this activity targeting (fine motor, gross motor, language, social-emotional, cognitive, creative)?"
      - id: "2B"
        name: "Anchor & Choice"
        questions:
          - id: 16
            level: "L2"
            text: "Are choice or variation materials available so children can personalize their engagement (different colors / textures / tools)?"
          - id: 17
            level: "L4"
            text: "Is there room for individual creativity within the structure, or is there a single \"right\" outcome expected?"
      - id: "2C"
        name: "Developmental Appropriateness"
        questions:
          - id: 18
            level: "L4"
            text: "Is the activity's complexity suitable for a 3–5 year old?"
          - id: 19
            level: "L4"
            text: "Is the activity duration realistic for the attention span of this age group?"
      - id: "2D"
        name: "Differentiation"
        questions:
          - id: 20
            level: "L4"
            text: "Can children at different skill levels engage meaningfully with the same setup?"
          - id: 21
            level: "L2"
            text: "Are there visible extensions (harder challenges) for children who finish quickly or want more?"
          - id: 22
            level: "L2"
            text: "Are there visible supports / scaffolds for children who need more help?"
          - id: 23
            level: "L4"
            text: "Is the activity equally accessible and inviting for all children, including girls, children with disabilities, and children from different cultural or linguistic backgrounds?"
      - id: "2E"
        name: "Self-Service & Autonomy"
        questions:
          - id: 24
            level: "L3"
            text: "Can children start the activity independently without waiting for adult instruction?"
          - id: 25
            level: "L3"
            text: "Can children replenish, swap, or return materials on their own during the activity?"

  - id: 3
    name: "The Teacher"
    framework: "CLASS Pre-K (all 10 dimensions)"
    sub_buckets:
      - id: "3A"
        name: "Positive Climate"
        questions:
          - id: 26
            level: "L3"
            text: "What is the teacher's overall tone — warm, neutral, or stern?"
          - id: 27
            level: "L2"
            text: "Does the teacher use children's names when addressing them?"
          - id: 28
            level: "L3"
            text: "Are there visible signs of shared positive moments (smiling, laughter, warm touches, enthusiasm)?"
      - id: "3B"
        name: "Negative Climate / Teacher Red Flags"
        questions:
          - id: 29
            level: "L3"
            text: "Are there moments of visible teacher frustration, irritation, or impatience?"
          - id: 30
            level: "L3"
            text: "Does the teacher use sarcasm, a harsh tone, or a raised/shouting voice at any point?"
          - id: 31
            level: "L2"
            text: "Are threats, punishment language, or warnings used?"
          - id: 32
            level: "L2"
            text: "Does the teacher make negative comments about children's behavior, abilities, or character?"
          - id: 33
            level: "L3"
            text: "Is any child publicly shamed, singled out negatively, or compared unfavorably to others?"
          - id: 34
            level: "L3"
            text: "Are there any instances where children may be unsafe — bad touch, physical roughness, abrupt handling, or unnecessary restriction of children?"
      - id: "3C"
        name: "Teacher Sensitivity"
        questions:
          - id: 35
            level: "L3"
            text: "Does the teacher notice when a child needs help, is upset, or is hesitating?"
          - id: 36
            level: "L3"
            text: "Does the teacher respond to individual children's emotional cues (distress, excitement, confusion)?"
          - id: 37
            level: "L3"
            text: "How does the teacher address problems when they arise?"
          - id: 38
            level: "L3"
            text: "Do children seek out the teacher for help, comfort, or to share something?"
      - id: "3D"
        name: "Regard for Student Perspectives"
        questions:
          - id: 39
            level: "L3"
            text: "Does the teacher invite children's choices, ideas, or opinions during the activity?"
          - id: 40
            level: "L2"
            text: "Are children physically free to move, shift positions, or take breaks?"
          - id: 41
            level: "L4"
            text: "Does the teacher follow children's leads or interests at times, vs sticking strictly to the plan?"
          - id: 42
            level: "L3"
            text: "Are children's contributions (questions, comments, made-up rules) welcomed or shut down?"
      - id: "3E"
        name: "Behavior Management"
        questions:
          - id: 43
            level: "L2"
            text: "Are expectations and rules for the activity communicated clearly to children?"
          - id: 44
            level: "L3"
            text: "How does the teacher manage disruptions in the classroom?"
          - id: 45
            level: "L3"
            text: "How does the teacher handle a child who seems distressed?"
          - id: 46
            level: "L3"
            text: "How does the teacher handle conflicts between children?"
          - id: 47
            level: "L3"
            text: "How does the teacher handle a child who refuses to participate or seems disengaged?"
      - id: "3F"
        name: "Productivity"
        questions:
          - id: 48
            level: "L3"
            text: "Are transitions (start, mid-activity shifts, cleanup) smooth and quick, or messy and slow?"
          - id: 49
            level: "L1"
            text: "How many minutes are spent on the activity vs setup, transition, and waiting?"
          - id: 50
            level: "L3"
            text: "Are there any lulls or moments where the activity stalls and loses momentum?"
          - id: 51
            level: "L2"
            text: "Does the activity have a clear wrap-up / ending, or does it fade out?"
      - id: "3G"
        name: "Instructional Learning Formats"
        questions:
          - id: 52
            level: "L2"
            text: "Which instructional formats does the teacher use to engage children (e.g. songs, hands-on, demonstration, gesture, storytelling, movement, role-play)?"
          - id: 53
            level: "L2"
            text: "Are children given hands-on opportunities to do the activity, vs just watching or listening?"
      - id: "3H"
        name: "Concept Development"
        questions:
          - id: 54
            level: "L2"
            text: "Does the teacher ask \"why\" or \"how\" questions that prompt children to think (e.g. \"what do you think will happen if…\")?"
          - id: 55
            level: "L3"
            text: "Does the teacher make connections to real-world experiences or to what children already know?"
          - id: 56
            level: "L4"
            text: "Does the teacher encourage children to be creative, generate their own ideas, or solve problems themselves?"
      - id: "3I"
        name: "Quality of Feedback"
        questions:
          - id: 57
            level: "L3"
            text: "Does the teacher offer hints, prompts, or partial answers rather than giving the full answer right away?"
          - id: 58
            level: "L4"
            text: "Does the teacher adjust the level of support based on individual children's needs?"
          - id: 59
            level: "L3"
            text: "Does the teacher follow up on children's responses with additional questions or extensions?"
          - id: 60
            level: "L3"
            text: "Is encouragement specific (praising effort, strategy, or specific actions) or generic (\"good job\")?"
      - id: "3J"
        name: "Language Modeling"
        questions:
          - id: 61
            level: "L2"
            text: "Are the teacher's questions mostly open-ended (extending thinking) or closed (yes/no, one-word answers)?"
          - id: 62
            level: "L3"
            text: "Does the teacher use rich, varied vocabulary appropriate to the activity?"
          - id: 63
            level: "L2"
            text: "Does the teacher name objects, actions, and feelings explicitly as they happen?"
          - id: 64
            level: "L3"
            text: "Does the teacher repeat and extend children's language (e.g. child says \"red,\" teacher says \"yes, a bright red roller\")?"

  - id: 4
    name: "The Children"
    framework: "Leuven Involvement & Well-Being Scales + HighScope COR"
    sub_buckets:
      - id: "4A"
        name: "Engagement & Involvement"
        questions:
          - id: 65
            level: "L2"
            text: "What number of children appear actively engaged at the peak of the activity vs disengaged?"
          - id: 66
            level: "L2"
            text: "What number of children were engaged for at least 80% of the time vs what number of children were NOT engaged for 80% of the time?"
      - id: "4B"
        name: "Exploration & Curiosity"
        questions:
          - id: 67
            level: "L3"
            text: "Do children try the activity in different ways, or stick to one rigid approach?"
          - id: 68
            level: "L2"
            text: "How many children asked a question during the activity?"
          - id: 69
            level: "L1"
            text: "What questions did the children ask?"
      - id: "4C"
        name: "Autonomy & Initiative"
        questions:
          - id: 70
            level: "L3"
            text: "Do children start the activity on their own, or wait for adult instruction?"
          - id: 71
            level: "L3"
            text: "Do children make their own choices during the activity (which color, which tool, what to make)?"
          - id: 72
            level: "L3"
            text: "Do children solve small problems themselves (e.g. paint not flowing, sharing a tool) before asking for help?"
      - id: "4D"
        name: "Emotional Well-being"
        questions:
          - id: 73
            level: "L3"
            text: "Are children visibly happy, relaxed, and at ease?"
          - id: 74
            level: "L3"
            text: "Do children show frustration, anxiety, or distress? How frequent and how intense?"
          - id: 75
            level: "L4"
            text: "Do children seem confident in their actions, or hesitant and seeking constant approval?"
      - id: "4E"
        name: "Social Behavior with Peers"
        questions:
          - id: 76
            level: "L2"
            text: "Do children interact with each other (talking, gesturing, sharing materials)?"
          - id: 77
            level: "L3"
            text: "Is there cooperation between children — working together, helping, or sharing space considerately?"
          - id: 78
            level: "L3"
            text: "Are there conflicts between children? How are they handled (by themselves, by teacher, or escalated)?"
          - id: 79
            level: "L4"
            text: "Are quieter or less-engaged children included by their peers, or left out?"
      - id: "4F"
        name: "Learning Indicators"
        questions:
          - id: 80
            level: "L2"
            text: "Do children verbalise what they're doing, thinking, or noticing?"
          - id: 81
            level: "L3"
            text: "Do children try to extend or modify the activity (adding their own variations)?"
          - id: 82
            level: "L2"
            text: "Do children produce or create something concrete during the activity (artwork, structure, story)?"

  - id: 5
    name: "The Interactions"
    framework: "Sustained Shared Thinking (EPPE) + joint attention research + CLASS Regard for Student Perspectives"
    sub_buckets:
      - id: "5A"
        name: "Teacher↔Child Exchange Quality"
        questions:
          - id: 83
            level: "L1"
            text: "What are the minutes where the children speak vs where the teacher speaks?"
      - id: "5B"
        name: "Sustained Shared Thinking"
        questions:
          - id: 84
            level: "L4"
            text: "Are ideas co-constructed (teacher and child build something together) or just transmitted (teacher tells, child receives)?"
      - id: "5C"
        name: "Joint Attention & Shared Engagement"
        questions:
          - id: 85
            level: "L3"
            text: "Are there shared moments of wonder, surprise, laughter, or discovery between teacher and children?"
          - id: 86
            level: "L2"
            text: "Does the teacher physically join children's play / activity, or direct from outside?"
      - id: "5D"
        name: "Attention Distribution & Inclusion"
        questions:
          - id: 87
            level: "L3"
            text: "Does every child get individual attention from the teacher at some point in the activity?"
          - id: 88
            level: "L3"
            text: "Are there children who dominate the teacher's attention vs children who get very little?"
          - id: 89
            level: "L4"
            text: "Does the teacher actively bring quieter / less-participating children into the conversation?"
          - id: 90
            level: "L2"
            text: "Does each child speak at least once during the class?"
      - id: "5E"
        name: "Receptivity to Children's Voice"
        questions:
          - id: 91
            level: "L4"
            text: "Are children's unusual, off-script, or \"wrong\" answers welcomed and explored, or shut down?"
