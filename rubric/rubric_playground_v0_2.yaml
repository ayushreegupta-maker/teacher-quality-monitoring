version: 0.2.3
name: TQM Playground Design Rubric
created_at: 2026-05-19

context:
  age_range: "3-5 years (Pre-K)"
  subject_scope: "play-space design evaluation, aligned with Openhouse Learning Hub playground principles"
  scoring_scale: "0 / 0.5 / 1 (no / partial / yes)"
  framework_basis: |
    Five dimensions aligned with the Openhouse Learning Hub playground-design
    framework. Where the source framework combines two criteria under one
    principle (e.g. "narrative AND 2+ senses engaged" under one principle),
    this rubric splits them into separate scorable dimensions so calibration
    can diagnose which sub-criterion the model and human raters disagree on.

    To compare model scores against team scores at the framework level:
      team principle "narrative"      ≈ average(narrative, multi_sensory)
      team principle "layout & flow"  ≈ average(boundary, movement)
      team principle "clean up"        = clean_up

    Changes from v0.1 (2026-05-19):
    - Renamed dimensions to match team labels (Narrative, Multi-sensory,
      Boundary, Movement, Clean up).
    - Tightened "Narrative" to focus on experiential context-setting only
      (sensory is its own dim now).
    - Lowered "Multi-sensory" threshold for score 1 to "2+ senses engaged"
      (previously required 3+).
    - Clarified "Boundary" so a single well-defined activity zone (canvas,
      paper, mat, table) is sufficient for score 1. Do not require multiple
      zones.
    - Refocused "Movement" on intentional flows + designated seating
      (rather than gross-motor variety alone).

    Changes from v0.2.0 (2026-05-19):
    - Broadened "Movement" so seating is NOT required — the test is whether
      children know where to go and have enough space to engage in whatever
      posture the activity calls for (standing, kneeling, sitting, walking).
      A sensory-bin activity where children naturally stand at the bins now
      qualifies for score 1 if positioning is otherwise deliberate.

    Changes from v0.2.1 (2026-05-19):
    - "Movement" flow criterion no longer requires *deliberately designed*
      pathways with visible markers. Clear, unobstructed access to the
      activity zone through the natural layout is sufficient. Visible path
      markers, taped routes, or explicit entry cues are NOT required.
    - However, observable obstructions DO still reduce the score: clutter,
      furniture blocking access, OR adults visibly crowding the pathway and
      blocking child access all count as obstruction. Adult crowding is
      treated as a real impedance to flow rather than ignored as a
      session-management issue.

    Changes from v0.2.2 (2026-05-19):
    - "Movement" obstruction-by-adults rule LOOSENED. A single adult merely
      present near or seated in the path does NOT count as obstruction so
      long as children can still get past to the activity. Obstruction
      only applies when adult presence is significant enough to materially
      block access — multiple adults forming a barrier, OR a single adult
      persistently preventing child movement. The test is whether children
      can still reach the activity, not whether any adult is in the path.

scoring_scale:
  values:
    0: "Indicator is absent or counterproductive across the observable space"
    0.5: "Indicator is partially present — some elements visible but incomplete or inconsistent"
    1: "Indicator is clearly and fully present"
  insufficient_evidence: |
    Use this in place of a numeric score when camera angle, video length, or
    video content does not allow the dimension to be observed reliably.

anti_bias_rules:
  - "Score based on design intent, not material cost or freshness. A simple, thoughtfully-arranged space can score 1; an expensive but disorganized space can score 0."
  - "Do not score based on cultural or regional decor styles, language of signage, or aesthetic preference."
  - "Do not reward visual busyness or abundance — clarity, intent, and child-centeredness are the signals."
  - "If the same design choice would receive a different score from a space serving a different cultural context, return the score the design earns on its own."
  - "Prefer 'insufficient_evidence' over guessing from thin signal."

evidence_requirements:
  - "Every numeric score must be supported by at least one timestamped visual observation."
  - "Quoted observations must appear verbatim in the vision-pass output, not paraphrased or invented."
  - "Confidence must be reported per dimension (high / medium / low)."
  - "Provide 2-4 evidence pieces when possible."

domains:
  - id: environment
    label: "Environmental Design"
    description: "Observable design qualities of the play space, evaluated from a short video of the setup plus the first moments of children entering and beginning to play."
    dimensions:

      - id: narrative
        label: "Narrative"
        description: "The space experientially sets a context for immersion. Decor, props, arrangement, or framing place the child inside a deliberate setting (e.g. forest, ocean, market, kitchen, an in-progress project) rather than presenting a neutral utility space."
        indicators:
          - "Thematic decor that names or evokes a setting"
          - "Props that place the child inside the theme"
          - "An atmospheric anchor (banner, central feature, framing object)"
          - "An 'in-progress project' feel where the setup itself tells what's happening"
        signal_mappings:
          visual:
            - "Decor, props, banners, and arrangements all pointing to one setting"
            - "A backdrop or central feature that anchors the theme"
            - "Setup that visibly places the activity inside a wider story"
        anchors:
          0: "No experiential context — generic space with no immersive framing; pure utility setup"
          0.5: "Some context-setting elements present (a prop or partial theme) but immersion is weak or incomplete across the space"
          1: "Clear, deliberate context for immersion — decor, props, or arrangement together place the child inside a setting"
        common_failure_modes:
          - "Generic classroom decoration (ABC posters, alphabet boards) is not narrative — it does not earn 1"
          - "Materials being laid out for an activity (paper + paints) is activity setup, not immersive narrative — earns 1 only if there is also deliberate scene-setting (e.g. 'this is our paint studio today' via decor or framing)"

      - id: multi_sensory
        label: "Multi-sensory"
        description: "The setup engages 2 or more senses. Visual, tactile, auditory, proprioceptive (movement/balance), and occasionally olfactory all count."
        indicators:
          - "Visual variety (color, materials, arrangements)"
          - "Tactile invitations (textures, materials to touch, wet/dry/soft/rough)"
          - "Sound-making elements (instruments, chimes, water, music)"
          - "Proprioceptive / movement opportunities (balance, climbing, kneeling)"
          - "Natural / sensory materials (sand, water, fabric, wood, leaves, clay, paint)"
        signal_mappings:
          visual:
            - "Multiple distinct material types visible (not all plastic, not all paper)"
            - "Tactile invitations such as bins of textured materials at child reach"
            - "Sound-making features visible even if not audible in recording"
            - "Setups that obviously engage hands AND eyes simultaneously (painting, water play, building)"
        anchors:
          0: "Only one sense engaged — everything is the same material or invites only one mode of engagement (e.g. screens only, posters only)"
          0.5: "Two senses are nominally engaged but at least one is weak or marginal"
          1: "Two or more senses are meaningfully engaged through deliberate material and arrangement choices"
        common_failure_modes:
          - "Floor painting with paints + paper meaningfully engages visual + tactile — earns 1 even without sound or movement"
          - "Visually busy but tactically monotonous (lots to look at, all plastic to touch) earns 0.5 at most"

      - id: boundary
        label: "Boundary"
        description: "The activity has clear physical or visual boundaries. A child can immediately tell where the activity zone is. A single well-defined zone is sufficient — multiple separate zones are not required."
        indicators:
          - "A clear physical or visual marker defining the activity area (paper, canvas, mat, rug, table, low fence, taped outline, etc.)"
          - "The boundary is intuitive to a child without verbal explanation from an adult"
          - "Safety boundaries are visually obvious where relevant"
        signal_mappings:
          visual:
            - "A canvas / paper / mat / rug / table that visually defines where the activity happens"
            - "Low shelves, dividers, or zone markers separating spaces if multi-zone"
            - "Clear sight lines for adult supervision without children feeling confined"
        anchors:
          0: "No clear boundary — children would not know where the activity is supposed to happen without being told"
          0.5: "A boundary is implied but ambiguous (e.g. materials present but no visible zone marker; or unclear where the activity area starts and stops)"
          1: "At least one clear, unambiguous activity boundary — a canvas, paper, mat, rug, table, low fence, or similar marker visually defines the zone. A single well-defined zone is sufficient for this score."
        common_failure_modes:
          - "A SINGLE clear zone (e.g. paper on the floor for floor painting) IS sufficient — do not penalize for not having multiple distinct zones if the activity is single-zone by design"
          - "If a teacher must verbally direct a child to the activity area ('go to the paper'), the boundary isn't fully self-evident — score lower"

      - id: movement
        label: "Movement"
        description: "The layout provides clear unobstructed access to the activity zone AND clear positioning where children engage with the activity. Children know WHERE to go, can get there without obstacles, and have enough space to do the activity in the appropriate posture (standing, kneeling, sitting, or moving around as the activity calls for). Visible path markers are NOT required — clear unobstructed access through the natural layout is sufficient. Seating is NOT required — deliberate positioning suited to the activity is sufficient. Includes hand-reach: materials should be reachable from the natural posture the activity invites."
        indicators:
          - "Children can clearly access the activity zone from the room entry — minor adult presence in the path is acceptable as long as children can still get past"
          - "Clear deliberate positioning suited to the activity (standing at table height for sensory bins, kneeling on the floor for floor painting, sitting on a mat for story time, etc.)"
          - "Children can intuitively tell WHERE to go to engage with the activity"
          - "Enough space at the activity for children to stand, kneel, sit, or move as the activity requires"
          - "Materials reachable from the natural posture the activity invites"
          - "No significant clutter, furniture, or persistent adult barriers materially blocking the path between entry and the activity zone"
        signal_mappings:
          visual:
            - "Children can walk from entry to activity zone through the natural layout without weaving around significant clutter, furniture, or persistent adult barriers"
            - "Activity setup makes the intended posture obvious (table at standing height → standing; floor paper → kneeling; mat / cushions → sitting)"
            - "Materials at child-arm-reach from whatever posture the activity invites"
            - "Enough physical space around the activity zone for the natural posture to fit"
            - "A single adult sitting near the path (e.g. on the stairs) while children still pass freely does NOT count as obstruction"
            - "Multiple adults forming a barrier or one adult persistently preventing child movement DOES count as obstruction"
            - "Crammed or maze-like setups indicate poor flow"
        anchors:
          0: "No clear access to the activity AND no clear positioning — children would not know how to move into or where to settle in the space; OR materials are out of reach from any natural posture; OR access is heavily and persistently obstructed (e.g. children visibly unable to reach the activity)"
          0.5: "Either clear unobstructed access OR clear positioning is present, but not both. Or one is partial. Significant access obstructions (multiple adults forming a barrier; persistent blocking; major clutter) reduce a 1 to 0.5; minor adult presence in the path does NOT."
          1: "Both elements are present — children can clearly access the activity zone (visible path markers not required; minor adult presence in the path is acceptable as long as children get past) AND deliberate positioning suited to the activity (standing, kneeling, or sitting as the activity calls for), with materials reachable from that posture. Explicit seating like cushions is NOT required when the activity naturally invites standing or kneeling."
        common_failure_modes:
          - "Materials visible but on a high adult shelf out of child reach earns 0 on this dimension even if movement flows are otherwise good"
          - "Visible path markers, taped routes, or explicit entry cues are NOT required. A clear, open route to the activity through the natural classroom layout is sufficient for unobstructed access."
          - "Do NOT require formal seating (cushions, chairs) when the activity is designed for standing or kneeling. Tables at child-standing height for sensory bins, or paper on the floor for kneeling painting, count as 'clear positioning' on their own."
          - "Adult presence in the path is NOT automatic obstruction. Only count as obstruction if the adult presence is significant enough to materially block child access — multiple adults forming a barrier, OR a single adult persistently preventing child movement. A single adult seated near the entry/path while children still walk past freely does NOT count."
          - "The test is whether children can still reach the activity, not whether any adult is in the path."

      - id: clean_up
        label: "Clean up"
        description: "Children can return all materials to their place without adult lifting or adult labelling help. The design itself supports the reset — child-height storage, items light enough to handle, intuitive return locations or visual labels."
        indicators:
          - "Items are light enough for a child to lift and carry"
          - "Storage is at child height and accessible without adult help"
          - "Return locations are intuitive or visually labelled (pictures, symbols, color codes, silhouettes — child-readable, not text-only)"
          - "Setup is organized rather than piled — children can see where each thing goes"
          - "Children can complete cleanup without an adult having to point out or relabel items each time"
        signal_mappings:
          visual:
            - "Bins, baskets, or shelves at child height with picture / symbol / color labels"
            - "Outlines or silhouettes on shelves indicating return positions"
            - "Storage furniture sized for children (low shelves, not adult cabinets)"
            - "Items obviously light enough for a child to carry (no buckets too heavy, no equipment requiring two adults)"
        anchors:
          0: "Children cannot return materials without adult help — items too heavy, no clear return spots, storage above child reach, or design requires adult intervention to reset"
          0.5: "Some materials can be returned by children, others require adult help (mixed system; partial labelling; some items reachable, some not)"
          1: "All materials can be returned by children unaided — items are light enough, storage is at child height, return locations are intuitive or visually labelled (no adult labelling or lifting required)"
        common_failure_modes:
          - "Adult cabinet with text-only label at adult eye-level requires adult labelling help — score down"
          - "Visual labels (picture / symbol / color) at child height ARE the design's own labelling, not 'adult labelling help' — these count as good design and earn full credit"
          - "Heavy buckets of water, large paper rolls, etc. that a child cannot carry alone count against the score even if storage is otherwise good"
